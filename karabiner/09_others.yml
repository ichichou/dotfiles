title: "09. Others"

aliases:

# Aliases {{{

- conditions: &en
  - type: input_source_if
    input_sources:
    # 英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.ascii$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.Roman$"
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

- conditions: &ja
  - type: input_source_if
    input_sources:
    - language: "^ja$"
  - type: input_source_unless
    input_sources:
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

- conditions: &symbol
  - type: variable_if
    name: symbol
    value: true
  - type: frontmost_application_unless
    bundle_identifiers:
    - "^com\\.apple\\.loginwindow$"

- parameters: &mod_tap_threshold_ms
    basic.to_if_alone_threshocld_millisecocnds: 120
    basic.to_if_held_down_threshold_milliseconds: 120
    basic.to_delayed_action_delay_milliseconds: 120

# }}}

rules:

# 9-1. Alone Kana/Eisuu {{{

- description: "9-1. Alone Kana/Eisuu"
  manipulators:

  # Shift-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: japanese_kana
      repeat: false

  # Ctrl-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - control
    to:
    - key_code: japanese_kana
      repeat: false

  # Opt-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - option
    to:
    - key_code: japanese_kana
      repeat: false

  # Cmd-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - command
    to:
    - key_code: japanese_kana
      repeat: false

  # Shift-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Ctrl-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - control
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Opt-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - option
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Cmd-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - command
    to:
    - key_code: japanese_eisuu
      repeat: false

# }}}

# 9-2. QAZ {{{

- description: "9-2. QAZ"
  manipulators:

  # Q -> Q/Hyper
  - type: basic
    from:
      key_code: q
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: q
      halt: true
    to_if_held_down:
    - key_code: right_shift
      modifiers:
      - right_control
      - right_option
      - right_command
      halt: true
    to_delayed_action:
      to_if_canceled:
      - key_code: q
    conditions: *en
    parameters: *mod_tap_threshold_ms

  # A -> A/LCtrl
  - type: basic
    from:
      key_code: a
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: a
      halt: true
    to_if_held_down:
    - key_code: left_control
      halt: true
    to_delayed_action:
      to_if_canceled:
      - key_code: a
    conditions: *en
    parameters: *mod_tap_threshold_ms

  # Z -> Z/LShift
  - type: basic
    from:
      key_code: z
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: z
      halt: true
    to_if_held_down:
    - key_code: left_shift
      halt: true
    to_delayed_action:
      to_if_canceled:
      - key_code: z
    conditions: *en
    parameters: *mod_tap_threshold_ms

# }}}

# 9-3. Quote and RCtrl {{{

- description: "9-3. Quote and RCtrl"
  manipulators:
  - type: basic
    from:
      key_code: quote
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: quote
      halt: true
    to_if_held_down:
    - key_code: right_control
      halt: true
    to_delayed_action:
      to_if_canceled:
      - key_code: quote
    conditions: *en
    parameters: *mod_tap_threshold_ms

# }}}

# 9-4. Symbol Mode {{{

- description: "9-4. Symbol Mode"
  manipulators:

  # Symbol Mode Key {{{

  # r -> r (英語入力時)
  - type: basic
    from:
      key_code: r
      modifiers:
        optional:
        - shift
    to_if_alone:
    - key_code: r
      halt: true
    to_if_held_down:
    - key_code: japanese_kana
    - set_variable:
        name: symbol
        value: true
        key_up_value: false
    to_after_key_up:
    - key_code: japanese_eisuu
    to_delayed_action:
      to_if_canceled:
      - key_code: r
    conditions: *en
    parameters: *mod_tap_threshold_ms

  # # r -> comma (日本語入力時)
  # # 新下駄配列で定義
  # - type: basic
  #   from:
  #     key_code: r
  #     modifiers:
  #       optional:
  #       - shift
  #   to_if_alone:
  #   - key_code: comma
  #     halt: true
  #   to_if_held_down:
  #   - set_variable:
  #       name: symbol
  #       value: true
  #       key_up_value: false
  #     halt: true
  #   to_delayed_action:
  #     to_if_canceled:
  #     - key_code: comma
  #   conditions: *ja
  #   parameters: *mod_tap_threshold_ms

  # }}}

  # Mapping {{{

  # 入力される記号はIMEの仮名テーブルで定義する

  # y
  - type: basic
    from:
      key_code: "y"
    to:
    - key_code: backslash
    - key_code: "y"
      repeat: false
    conditions: *symbol

  # u
  - type: basic
    from:
      key_code: u
    to:
    - key_code: backslash
    - key_code: u
      repeat: false
    conditions: *symbol

  # i
  - type: basic
    from:
      key_code: i
    to:
    - key_code: backslash
    - key_code: i
      repeat: false
    conditions: *symbol

  # o
  - type: basic
    from:
      key_code: o
    to:
    - key_code: backslash
    - key_code: o
      repeat: false
    conditions: *symbol

  # p
  - type: basic
    from:
      key_code: p
    to:
    - key_code: backslash
    - key_code: p
      repeat: false
    conditions: *symbol

  # h
  - type: basic
    from:
      key_code: h
    to:
    - key_code: backslash
    - key_code: h
      repeat: false
    conditions: *symbol

  # j
  - type: basic
    from:
      key_code: j
    to:
    - key_code: backslash
    - key_code: j
      repeat: false
    conditions: *symbol

  # k
  - type: basic
    from:
      key_code: k
    to:
    - key_code: backslash
    - key_code: k
      repeat: false
    conditions: *symbol

  # l
  - type: basic
    from:
      key_code: l
    to:
    - key_code: backslash
    - key_code: l
      repeat: false
    conditions: *symbol

  # ;
  - type: basic
    from:
      key_code: semicolon
    to:
    - key_code: backslash
    - key_code: semicolon
      repeat: false
    conditions: *symbol

  # :
  - type: basic
    from:
      key_code: semicolon
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: semicolon
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # '
  - type: basic
    from:
      key_code: quote
    to:
    - key_code: backslash
    - key_code: quote
      repeat: false
    conditions: *symbol

  # "
  - type: basic
    from:
      key_code: quote
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: quote
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # n
  - type: basic
    from:
      key_code: "n"
    to:
    - key_code: backslash
    - key_code: "n"
      repeat: false
    conditions: *symbol

  # m
  - type: basic
    from:
      key_code: m
    to:
    - key_code: backslash
    - key_code: m
      repeat: false
    conditions: *symbol

  # ,
  - type: basic
    from:
      key_code: comma
    to:
    - key_code: backslash
    - key_code: comma
      repeat: false
    conditions: *symbol

  # .
  - type: basic
    from:
      key_code: period
    to:
    - key_code: backslash
    - key_code: period
      repeat: false
    conditions: *symbol

  # <
  - type: basic
    from:
      key_code: comma
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: comma
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # >
  - type: basic
    from:
      key_code: period
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: period
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # /
  - type: basic
    from:
      key_code: slash
    to:
    - key_code: backslash
    - key_code: slash
      repeat: false
    conditions: *symbol

  # ?
  - type: basic
    from:
      key_code: slash
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: slash
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # [
  - type: basic
    from:
      key_code: open_bracket
    to:
    - key_code: backslash
    - key_code: open_bracket
      repeat: false
    conditions: *symbol

  # ]
  - type: basic
    from:
      key_code: close_bracket
    to:
    - key_code: backslash
    - key_code: close_bracket
      repeat: false
    conditions: *symbol

  # {
  - type: basic
    from:
      key_code: open_bracket
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: open_bracket
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # }
  - type: basic
    from:
      key_code: close_bracket
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: close_bracket
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # (
  - type: basic
    from:
      key_code: "9"
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: "9"
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # )
  - type: basic
    from:
      key_code: "0"
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: backslash
    - key_code: "0"
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # 9 (alternative for '(')
  - type: basic
    from:
      key_code: "9"
    to:
    - key_code: backslash
    - key_code: "9"
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # 0 (alternative for ')')
  - type: basic
    from:
      key_code: "0"
    to:
    - key_code: backslash
    - key_code: "0"
      modifiers:
      - shift
      repeat: false
    conditions: *symbol

  # }}}

# }}}

# 9-5. Click Key {{{

- description: "9-5. Click Key"
  manipulators:

  # W -> Right Click
  - type: basic
    from:
      key_code: w
      modifiers:
        optional:
        - left_shift
    to:
    - pointing_button: button2
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

  # E -> Left Click
  - type: basic
    from:
      key_code: e
      modifiers:
        optional:
        - left_shift
    to:
    - pointing_button: button1
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

  # R -> Middle Click
  - type: basic
    from:
      key_code: r
      modifiers:
        optional:
        - left_shift
    to:
    - pointing_button: button3
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

# }}}

# 9-6. LCtrl-Space -> LCtrl-Space, Eisuu {{{

# Raycast をメインのショートカットで起動した場合は英語入力にするが、
# それ以外のホットキー等で起動した場合は IME の状態を維持する
# Raycast 設定の Auto-switch Input Source はオフにする

