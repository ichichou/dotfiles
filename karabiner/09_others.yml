title: "09. Others"

aliases:

# Aliases {{{

- conditions: &en
  - type: input_source_if
    input_sources:
    # 英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.ascii$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.Roman$"
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

- conditions: &ja
  - type: input_source_if
    input_sources:
    - language: "^ja$"
  - type: input_source_unless
    input_sources:
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

- parameters: &mod_tap_threshold_ms
    basic.to_if_alone_threshocld_millisecocnds: 150
    basic.to_if_held_down_threshold_milliseconds: 150
    basic.to_delayed_action_delay_milliseconds: 200

# }}}

rules:

# 9-1. Alone Kana/Eisuu {{{

- description: "9-1. Alone Kana/Eisuu"
  manipulators:

  # Shift-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: japanese_kana
      repeat: false

  # Ctrl-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - control
    to:
    - key_code: japanese_kana
      repeat: false

  # Opt-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - option
    to:
    - key_code: japanese_kana
      repeat: false

  # Cmd-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - command
    to:
    - key_code: japanese_kana
      repeat: false

  # Shift-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Ctrl-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - control
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Opt-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - option
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Cmd-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - command
    to:
    - key_code: japanese_eisuu
      repeat: false

# }}}

# 9-2. QAZ {{{

- description: "9-2. QAZ"
  manipulators:

  # Q -> Q/Hyper
  - type: basic
    from:
      key_code: q
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: q
      halt: true
    to_if_held_down:
    - key_code: right_shift
      modifiers:
      - right_control
      - right_option
      - right_command
    to_delayed_action:
      to_if_canceled:
      - key_code: q
    conditions: *en
    parameters: *mod_tap_threshold_ms

  # A -> A/LCtrl
  - type: basic
    from:
      key_code: a
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: a
      halt: true
    to_if_held_down:
    - key_code: left_control
    to_delayed_action:
      to_if_canceled:
      - key_code: a
    conditions: *en
    parameters: *mod_tap_threshold_ms

  # Z -> Z/LShift
  - type: basic
    from:
      key_code: z
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: z
      halt: true
    to_if_held_down:
    - key_code: left_shift
    to_delayed_action:
      to_if_canceled:
      - key_code: z
    conditions: *en
    parameters: *mod_tap_threshold_ms

# }}}

# 9-3. Quote and RCtrl {{{

- description: "9-3. Quote and RCtrl"
  manipulators:

  # Quote and RCtrl
  - type: basic
    from:
      key_code: quote
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: quote
      halt: true
    to_if_held_down:
    - key_code: right_control
    to_delayed_action:
      to_if_canceled:
      - key_code: quote
    conditions: *en
    parameters: *mod_tap_threshold_ms

# }}}

# 9-4. Click Key {{{

- description: "9-4. Click Key"
  manipulators:

  # W -> Right Click
  - type: basic
    from:
      key_code: w
      modifiers:
        optional:
        - left_shift
    to:
    - pointing_button: button2
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

  # E -> Left Click
  - type: basic
    from:
      key_code: e
      modifiers:
        optional:
        - left_shift
    to:
    - pointing_button: button1
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

  # R -> Middle Click
  - type: basic
    from:
      key_code: r
      modifiers:
        optional:
        - left_shift
    to:
    - pointing_button: button3
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

# }}}

