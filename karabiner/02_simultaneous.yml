title: "02. Simultaneous"

# ALIASES ========================================

aliases:

- parameters: &short_threshold_ms
    basic.simultaneous_threshold_milliseconds: 40

- conditions: &en
  - type: input_source_if
    input_sources:
    - language: "^en$"

- conditions: &ja
  - type: input_source_if
    input_sources:
    - language: "^ja$"

# RULES ==========================================

rules:
- description: "2. Simultaneous"
  manipulators:

# 両手 {{{

  # VM -> Return
  - type: basic
    from:
      simultaneous:
      - key_code: v
      - key_code: m
    to:
    - key_code: return_or_enter
      repeat: false

  # VN -> Return (代替)
  - type: basic
    from:
      simultaneous:
      - key_code: v
      - key_code: "n"
    to:
    - key_code: return_or_enter
      repeat: false

  # FJ -> Shift-Ctrl-k (日本語入力時のみ)
  # macSKK: 入力中のかなカナ切り替え
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: j
    to:
    - key_code: k
      modifiers:
      - shift
      - control
      repeat: false
    conditions: *ja

  # # RU -> (no map)
  # - type: basic
  #   from:
  #     simultaneous:
  #     - key_code: r
  #     - key_code: u
  #   to:
  #   - key_code:
  #     repeat: false

# }}}

# 片手・横 {{{

  # Regular Threshold Milliseconds {{{

  # FG -> [#]
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: g
    to:
    - key_code: open_bracket
    - key_code: close_bracket
    - key_code: left_arrow
      repeat: false

  # HJ -> (#)
  - type: basic
    from:
      simultaneous:
      - key_code: h
      - key_code: j
    to:
    - key_code: "9"
      modifiers:
      - shift
    - key_code: "0"
      modifiers:
      - shift
    - key_code: left_arrow
      repeat: false

  # RT -> []_
  - type: basic
    from:
      simultaneous:
      - key_code: r
      - key_code: t
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: open_bracket
    - key_code: close_bracket
    - key_code: spacebar
    - key_code: japanese_kana
      conditions: *ja
      repeat: false

  # YU -> {#} (英語)
  # YU -> 【#】 (日本語)
  - type: basic
    from:
      simultaneous:
      - key_code: "y"
      - key_code: u
    to:
    - key_code: backslash
      conditions: *ja
    - key_code: open_bracket
      modifiers:
      - shift
    - key_code: backslash
      conditions: *ja
    - key_code: close_bracket
      modifiers:
      - shift
    - key_code: left_arrow
      repeat: false

  # VB -> "#" (英語)
  # VB -> ［#］ (日本語)
  - type: basic
    from:
      simultaneous:
      - key_code: v
      - key_code: b
    to:
    - key_code: quote
      modifiers:
      - shift
      conditions: *en
    - key_code: quote
      modifiers:
      - shift
      conditions: *en
    - key_code: backslash
      conditions: *ja
    - key_code: open_bracket
      conditions: *ja
    - key_code: backslash
      conditions: *ja
    - key_code: close_bracket
      conditions: *ja
    - key_code: left_arrow
      repeat: false

  # NM -> {#}
  - type: basic
    from:
      simultaneous:
      - key_code: "n"
      - key_code: m
    to:
    - key_code: open_bracket
      modifiers:
      - shift
    - key_code: close_bracket
      modifiers:
      - shift
    - key_code: left_arrow
      repeat: false

  # }}}

  # Short Threshold Milliseconds {{{

  # DF -> Eisuu
  - type: basic
    from:
      simultaneous:
      - key_code: d
      - key_code: f
    to:
    - key_code: japanese_eisuu
      repeat: false
    parameters: *short_threshold_ms

  # JK -> Kana
  - type: basic
    from:
      simultaneous:
      - key_code: j
      - key_code: k
    to:
    - key_code: japanese_kana
      repeat: false
    parameters: *short_threshold_ms

  # }}}

# }}}

# 片手・斜め {{{

  # Regular Threshold Milliseconds {{{

  # RG -> ・ (日本語入力時のみ)
  - type: basic
    from:
      simultaneous:
      - key_code: r
      - key_code: g
    to:
    - key_code: quote
      modifiers:
      - shift
      repeat: false
    conditions: *ja

  # RF -> ・ (日本語入力時のみ・代替)
  - type: basic
    from:
      simultaneous:
      - key_code: r
      - key_code: f
    to:
    - key_code: quote
      modifiers:
      - shift
      repeat: false
    conditions: *ja

  # UH -> /
  - type: basic
    from:
      simultaneous:
      - key_code: u
      - key_code: h
    to:
    - key_code: slash
      repeat: false

  # FB -> !
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: b
    to:
    - key_code: "1"
      modifiers:
      - shift
      repeat: false

  # FV -> ! (代替)
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: v
    to:
    - key_code: "1"
      modifiers:
      - shift
      repeat: false

  # JN -> ?
  - type: basic
    from:
      simultaneous:
      - key_code: j
      - key_code: "n"
    to:
    - key_code: slash
      modifiers:
      - shift
      repeat: false

  # }}}

  # Short Threshold Milliseconds {{{

  # EF -> Eisuu
  - type: basic
    from:
      simultaneous:
      - key_code: e
      - key_code: f
    to:
    - key_code: japanese_eisuu
      repeat: false
    parameters: *short_threshold_ms

  # JI -> Kana
  - type: basic
    from:
      simultaneous:
      - key_code: j
      - key_code: i
    to:
    - key_code: japanese_kana
      repeat: false
    parameters: *short_threshold_ms

  # }}}

# }}}

# 特殊 {{{

  # LCmd + Space -> Return
  - type: basic
    from:
      simultaneous:
      - key_code: left_command
      - key_code: spacebar
    to:
    - key_code: return_or_enter
      repeat: false

  # Space + Return -> Ctrl-Return
  - type: basic
    from:
      simultaneous:
      - key_code: spacebar
      - key_code: return_or_enter
    to:
    - key_code: spacebar
      modifiers:
      - control
      repeat: false

  # Q + W -> Hyper-E
  # 同時押しで Hyper-E を送信
  - type: basic
    from:
      simultaneous:
      - key_code: q
      - key_code: w
    to:
    - key_code: e
      modifiers:
      - right_shift
      - right_command
      - right_control
      - right_option

# }}}
