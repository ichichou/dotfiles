title: "07. Hyper Key"

# ALIASES ========================================

aliases:

- from/modifiers: &from_mods
    mandatory:
    - right_shift
    - right_control
    - right_option
    - right_command

- to/modifiers: &to_mods
  - right_shift
  - right_control
  - right_option
  - right_command

# RULES ==========================================

rules:
- description: "7. Hyper Key"
  manipulators:

# Hyper Key --------------------------------------

  # Tab -> Tab/Hyper
  - type: basic
    from:
      key_code: tab
    to_if_alone:
    - key_code: tab
    to:
    - key_code: right_shift
      modifiers:
      - right_control
      - right_option
      - right_command
      lazy: true

# Special Mappings -----------------------------------

  # Hyper-Q -> Hyper-E
  # Raycast では Hyper-Q をホットキーとして直接設定できないため
  - type: basic
    from:
      key_code: q
      modifiers: *from_mods
    to:
    - key_code: e
      modifiers: *to_mods

  # Hyper-L -> Eisuu, Ghostty
  - type: basic
    from:
      key_code: l
      modifiers: *from_mods
    to:
    - key_code: japanese_eisuu
    - key_code: l
      modifiers: *to_mods
