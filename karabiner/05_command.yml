title: "05. Command Key"
rules:
- description: "5. Command Key"
  manipulators:

  # LCmd-Any {{{

  # LCmd-Space -> Return
  - type: basic
    from:
      key_code: spacebar
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: return_or_enter
      repeat: false

  # LCmd-RCmd -> Esc
  - type: basic
    from:
      key_code: right_command
      modifiers:
        mandatory:
        - left_command
    to:
    - key_code: escape
      repeat: false

  # # RCmd-LCmd -> Esc
  # - type: basic
  #   from:
  #     key_code: left_command
  #     modifiers:
  #       mandatory:
  #       - right_command
  #   to:
  #   - key_code: escape
  #     repeat: false

  # LCmd-U -> LCmd-H
  - type: basic
    from:
      key_code: u
      modifiers:
        mandatory:
        - left_command
    to:
    - key_code: h
      modifiers:
      - left_command
      repeat: false

  # }}}

  # LCmd-HJKL -> Arrow Keys {{{

  # LCmd-H -> Left
  - type: basic
    from:
      key_code: h
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_arrow

  # LCmd-J -> Down
  - type: basic
    from:
      key_code: j
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: down_arrow

  # LCmd-K -> Up
  - type: basic
    from:
      key_code: k
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: up_arrow

  # LCmd-L -> Right
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: right_arrow

  # }}}

  # LCmd-NM -> Delete, Delete Forward {{{

  # LCmd-N -> Delete
  - type: basic
    from:
      key_code: "n"
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: delete_or_backspace

  # LCmd-M -> Delete Forward
  - type: basic
    from:
      key_code: m
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: delete_forward

  # }}}

  # LCmd-,. -> LCtrl-AE {{{

  # LCmd-, -> LCtrl-A
  - type: basic
    from:
      key_code: comma
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: a
      modifiers:
      - left_control

  # LCmd-. -> LCtrl-E
  - type: basic
    from:
      key_code: period
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: e
      modifiers:
      - left_control

  # }}}

  # Home Row Mods {{{

  # -- Left Hand Side {{{

  # LCmd-(any)-D-*** -> LCmd-LShift-(any)-***
  - type: basic
    from:
      key_code: d
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_shift
      modifiers:
      - left_command
    to_if_alone:
    - key_code: d
      modifiers:
      - left_command

  # LCmd-(any)-S-*** -> LCmd-LCtrl-(any)-***
  - type: basic
    from:
      key_code: s
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_control
      modifiers:
      - left_command
    to_if_alone:
    - key_code: s
      modifiers:
      - left_command

  # LCmd-(any)-A-*** -> LCmd-LOpt-(any)-***
  - type: basic
    from:
      key_code: a
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_option
      modifiers:
      - left_command
    to_if_alone:
    - key_code: a
      modifiers:
      - left_command

  # }}}

  # -- Right Hand Side {{{

  # Cmd 以外の入力・出力キーを左修飾キーにしているのは、
  # Hyper キーとの競合を避けるため

  # RCmd-(left any)-K-*** -> RCmd-LShift-(left any)-***
  - type: basic
    from:
      key_code: k
      modifiers:
        mandatory:
        - right_command
        optional:
        - left_shift
        - left_control
        - left_option
    to:
    - key_code: left_shift
      modifiers:
      - right_command
    to_if_alone:
    - key_code: k
      modifiers:
      - right_command

  # RCmd-(left any)-L-*** -> RCmd-LCtrl-(left any)-***
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - right_command
        optional:
        - left_shift
        - left_control
        - left_option
    to:
    - key_code: left_control
      modifiers:
      - right_command
    to_if_alone:
    - key_code: l
      modifiers:
      - right_command

  # RCmd-(left any)-;-*** -> RCmd-LOpt-(left any)-***
  - type: basic
    from:
      key_code: semicolon
      modifiers:
        mandatory:
        - right_command
        optional:
        - left_shift
        - left_control
        - left_option
    to:
    - key_code: left_option
      modifiers:
      - right_command
    to_if_alone:
    - key_code: semicolon
      modifiers:
      - right_command

  # }}}

  # }}}

  # Left Command Key {{{

  # LCmd -> Eisuu/LCmd
  # # LCmd -> Eisuu/LCmd (on Apple Internal Keyboard)
  - type: basic
    from:
      key_code: left_command
    to:
    - key_code: left_command
      lazy: true
    to_if_alone:
    - key_code: japanese_eisuu
    # conditions:
    # - type: device_if
    #   identifiers:
    #   # Apple Internal Keyboard
    #   - is_built_in_keyboard: true

  # }}}

  # Right Command Key {{{

  # # RCmd -> Kana/RCmd (on Apple Internal Keyboard)
  # - type: basic
  #   from:
  #     key_code: right_command
  #   to:
  #   - key_code: right_command
  #     lazy: true
  #   to_if_alone:
  #   - key_code: japanese_kana
  #   conditions:
  #   - type: device_if
  #     identifiers:
  #     # Apple Internal Keyboard
  #     - is_built_in_keyboard: true

  # RCmd -> Delete/RCmd
  # # RCmd -> Delete/RCmd (on Apple Internal Keyboard)
  - type: basic
    from:
      key_code: right_command
      modifiers:
        optional:
        - any
    to:
    - key_code: delete_or_backspace
    to_after_key_up:
    - set_variable:
        name: command_delete
        value: 0
    conditions:
    - type: variable_if
      name: command_delete
      value: 1
    # - type: device_if
    #   identifiers:
    #   # Apple Internal Keyboard
    #   - is_built_in_keyboard: true

  - type: basic
    from:
      key_code: right_command
      modifiers:
        optional:
        - any
    to:
    - key_code: right_command
      lazy: true
    to_if_alone:
    - key_code: delete_or_backspace
    - set_variable:
        name: command_delete
        value: 1
    to_delayed_action:
      to_if_invoked:
      - set_variable:
          name: command_delete
          value: 0
      to_if_canceled:
      - set_variable:
          name: command_delete
          value: 0
    # conditions:
    # - type: device_if
    #   identifiers:
    #   # Apple Internal Keyboard
    #   - is_built_in_keyboard: true
    parameters:
      basic.to_delayed_action_delay_milliseconds: 150

  # }}}
