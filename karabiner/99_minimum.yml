title: "99. Minimum Mappings"

# Aliases {{{

aliases:

- conditions: &en
  - type: input_source_if
    input_sources:
    # 英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.ascii$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.Roman$"
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

- conditions: &ja
  - type: input_source_if
    input_sources:
    - language: "^ja$"
  - type: input_source_unless
    input_sources:
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

# }}}

rules:

# FG/HJ -> []/() {{{

- description: "FG/HJ → 「」/（）"
  manipulators:

  # FG -> [], Left Arrow
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: g
    to:
    - key_code: open_bracket
    - key_code: close_bracket
    - key_code: left_arrow
      repeat: false

  # HJ -> (), Left Arrow
  - type: basic
    from:
      simultaneous:
      - key_code: h
      - key_code: j
    to:
    - key_code: "9"
      modifiers:
      - shift
    - key_code: "0"
      modifiers:
      - shift
    - key_code: left_arrow
      repeat: false

# }}}

# Combo -> Symbol {{{

- description: "Combo → Symbol"
  manipulators:

  # RG -> ・
  - type: basic
    from:
      simultaneous:
      - key_code: r
      - key_code: g
    to:
    - key_code: slash
      repeat: false

  # RF -> ・ (代替)
  - type: basic
    from:
      simultaneous:
      - key_code: r
      - key_code: f
    to:
    - key_code: slash
      repeat: false

  # UH -> ／
  - type: basic
    from:
      simultaneous:
      - key_code: u
      - key_code: h
    to:
    - key_code: backslash
      conditions: *ja
    - key_code: slash
      repeat: false

  # FB -> ！
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: b
    to:
    - key_code: "1"
      modifiers:
      - shift
      repeat: false

  # FV -> ！ (代替)
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: v
    to:
    - key_code: "1"
      modifiers:
      - shift
      repeat: false

  # JN -> ？
  - type: basic
    from:
      simultaneous:
      - key_code: j
      - key_code: "n"
    to:
    - key_code: slash
      modifiers:
      - shift
      repeat: false

# }}}

# Command Key {{{

- description: "LCmd + Space → Return"
  manipulators:

  # LCmd-Space -> Return
  - type: basic
    from:
      key_code: spacebar
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: return_or_enter
      repeat: false

- description: "LCmd + RCmd → Esc"
  manipulators:

  # LCmd-RCmd -> Esc
  - type: basic
    from:
      key_code: right_command
      modifiers:
        mandatory:
        - left_command
    to:
    - key_code: escape
      repeat: false

  # RCmd-LCmd -> Esc
  - type: basic
    from:
      key_code: left_command
      modifiers:
        mandatory:
        - right_command
    to:
    - key_code: escape
      repeat: false

# LCmd + I/J/K/L -> Cursor Keys {{{

- description: "LCmd + I/J/K/L → Cursor Keys"
  manipulators:

  # LCmd-I -> Up
  - type: basic
    from:
      key_code: i
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: up_arrow

  # LCmd-J -> Left
  - type: basic
    from:
      key_code: j
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_arrow

  # LCmd-K -> Down
  - type: basic
    from:
      key_code: k
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: down_arrow

  # LCmd-L -> Right
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: right_arrow

# }}}

# LCmd + H/J/K/L -> Cursor Keys {{{

- description: "LCmd + H/J/K/L → Cursor Keys"
  manipulators:

  # LCmd-H -> Left
  - type: basic
    from:
      key_code: h
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_arrow

  # LCmd-J -> Down
  - type: basic
    from:
      key_code: j
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: down_arrow

  # LCmd-K -> Up
  - type: basic
    from:
      key_code: k
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: up_arrow

  # LCmd-L -> Right
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: right_arrow

# }}}

- description: "LCmd + N/M → Delete / Delete Forward"
  manipulators:

  # LCmd-N -> Delete
  - type: basic
    from:
      key_code: "n"
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: delete_or_backspace

  # LCmd-M -> Delete Forward
  - type: basic
    from:
      key_code: m
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: delete_forward

- description: "LCmd/RCmd → Eisuu/Kana"
  manipulators:

  # LCmd -> Eisuu/LCmd
  - type: basic
    from:
      key_code: left_command
    to:
    - key_code: left_command
      lazy: true
    to_if_alone:
    - key_code: japanese_eisuu

  # RCmd -> Kana/RCmd
  - type: basic
    from:
      key_code: right_command
    to:
    - key_code: right_command
      lazy: true
    to_if_alone:
    - key_code: japanese_kana

# }}}

# Control Key {{{

- description: "Caps Lock → Esc & Ctrl"
  manipulators:

  # Caps Lock -> Esc/LCtrl
  - type: basic
    from:
      key_code: caps_lock
      modifiers:
        optional:
        - any
    to:
    - key_code: left_control
      lazy: true
    to_if_alone:
    - key_code: escape

  # Esc -> Esc/LCtrl
  - type: basic
    from:
      key_code: escape
      modifiers:
        optional:
        - any
    to:
    - key_code: left_control
      lazy: true
    to_if_alone:
    - key_code: escape

# }}}

# Numpad Layer {{{

- description: "LCtrl + Right Hand Side → Numpad Layer"
  manipulators:

  # YUIOP {{{

  # # LCtrl-Y -> (no map)
  # - type: basic
  #   from:
  #     key_code: "y"
  #     modifiers:
  #       mandatory:
  #       - left_control
  #       optional:
  #       - any
  #   to:
  #   - key_code:

  # LCtrl-U -> Keypad 7
  - type: basic
    from:
      key_code: u
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_7

  # LCtrl-I -> Keypad 8
  - type: basic
    from:
      key_code: i
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_8

  # LCtrl-O -> Keypad 9
  - type: basic
    from:
      key_code: o
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_9

  # LCtrl-P -> Keypad Period
  - type: basic
    from:
      key_code: p
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_period

  # }}}

  # HJKL; {{{

  # LCtrl-H -> Delete
  - type: basic
    from:
      key_code: h
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: delete_or_backspace

  # LCtrl-J -> Keypad 4
  - type: basic
    from:
      key_code: j
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_4

  # LCtrl-K -> Keypad 5
  - type: basic
    from:
      key_code: k
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_5

  # LCtrl-L -> Keypad 6
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_6

  # LCtrl-; -> Keypad Comma
  - type: basic
    from:
      key_code: semicolon
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_comma

  # }}}

  # NM,./ {{{

  # LCtrl-N -> Keypad 0
  - type: basic
    from:
      key_code: "n"
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_0

  # LCtrl-M -> Keypad 1
  - type: basic
    from:
      key_code: m
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_1

  # LCtrl-, -> Keypad 2
  - type: basic
    from:
      key_code: comma
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_2

  # LCtrl-. -> Keypad 3
  - type: basic
    from:
      key_code: period
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: keypad_3

  # # LCtrl-/ -> Return
  # - type: basic
  #   from:
  #     key_code: slash
  #     modifiers:
  #       mandatory:
  #       - left_control
  #       optional:
  #       - any
  #   to:
  #   - key_code: return_or_enter

  # }}}

# }}}

# Hyper Key {{{

- description: "Tab → Tab & Hyper Key"
  manipulators:

  # Tab -> Tab/Hyper
  - type: basic
    from:
      key_code: tab
    to_if_alone:
    - key_code: tab
    to:
    - key_code: right_shift
      modifiers:
      - right_control
      - right_option
      - right_command
      lazy: true

# }}}

# SandS {{{

- description: "Space → Space & Shift"
  manipulators:

  # SandS
  - type: basic
    from:
      key_code: spacebar
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: spacebar
    to:
    - key_code: left_shift
      lazy: true

# }}}

# Click Key {{{

- description: "Click Key"
  manipulators:

  # W -> Right Click
  - type: basic
    from:
      key_code: w
      modifiers:
        optional:
        - any
    to:
    - pointing_button: button2
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

  # E -> Left Click
  - type: basic
    from:
      key_code: e
      modifiers:
        optional:
        - any
    to:
    - pointing_button: button1
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

  # R -> Middle Click
  - type: basic
    from:
      key_code: r
      modifiers:
        optional:
        - any
    to:
    - pointing_button: button3
    conditions:
    - type: variable_unless
      name: multitouch_extension_finger_count_total
      value: 0

# }}}
