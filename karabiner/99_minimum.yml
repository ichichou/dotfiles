title: "99. Minimum Mappings"
rules:

# Combo -> Symbol {{{

- description: "Combo -> Symbol"
  manipulators:

  # RG -> ・
  - type: basic
    from:
      simultaneous:
      - key_code: r
      - key_code: g
    to:
    - key_code: slash
      repeat: false

  # RF -> ・ (代替)
  - type: basic
    from:
      simultaneous:
      - key_code: r
      - key_code: f
    to:
    - key_code: slash
      repeat: false

  # UH -> ／
  - type: basic
    from:
      simultaneous:
      - key_code: u
      - key_code: h
    to:
    - key_code: backslash
    - key_code: slash
      repeat: false

  # FB -> ！
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: b
    to:
    - key_code: "1"
      modifiers:
      - left_shift
      repeat: false

  # FV -> ！ (代替)
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: v
    to:
    - key_code: "1"
      modifiers:
      - left_shift
      repeat: false

  # JN -> ？
  - type: basic
    from:
      simultaneous:
      - key_code: j
      - key_code: "n"
    to:
    - key_code: slash
      modifiers:
      - left_shift
      repeat: false

# }}}

# FG/HJ -> []/() {{{

- description: "FG/HJ → 「」/（）"
  manipulators:

  # FG -> [], Left Arrow
  - type: basic
    from:
      simultaneous:
      - key_code: f
      - key_code: g
    to:
    - key_code: open_bracket
    - key_code: close_bracket
    - key_code: left_arrow
      repeat: false

  # HJ -> (), Left Arrow
  - type: basic
    from:
      simultaneous:
      - key_code: h
      - key_code: j
    to:
    - key_code: "9"
      modifiers:
      - left_shift
    - key_code: "0"
      modifiers:
      - left_shift
    - key_code: left_arrow
      repeat: false

# }}}

# Command Key {{{

- description: "LCmd + Space → Return"
  manipulators:

  # LCmd-Space -> Return
  - type: basic
    from:
      key_code: spacebar
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: return_or_enter
      repeat: false

- description: "LCmd + RCmd → Esc"
  manipulators:

  # LCmd-RCmd -> Esc
  - type: basic
    from:
      key_code: right_command
      modifiers:
        mandatory:
        - left_command
    to:
    - key_code: escape
      repeat: false

  # RCmd-LCmd -> Esc
  - type: basic
    from:
      key_code: left_command
      modifiers:
        mandatory:
        - right_command
    to:
    - key_code: escape
      repeat: false

# LCmd + I/J/K/L -> Cursor Keys {{{

- description: "LCmd + I/J/K/L → Cursor Keys"
  manipulators:

  # LCmd-I -> Up
  - type: basic
    from:
      key_code: i
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: up_arrow

  # LCmd-J -> Left
  - type: basic
    from:
      key_code: j
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_arrow

  # LCmd-K -> Down
  - type: basic
    from:
      key_code: k
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: down_arrow

  # LCmd-L -> Right
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: right_arrow

# }}}

# LCmd + H/J/K/L -> Cursor Keys {{{

- description: "LCmd + H/J/K/L → Cursor Keys"
  manipulators:

  # LCmd-H -> Left
  - type: basic
    from:
      key_code: h
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: left_arrow

  # LCmd-J -> Down
  - type: basic
    from:
      key_code: j
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: down_arrow

  # LCmd-K -> Up
  - type: basic
    from:
      key_code: k
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: up_arrow

  # LCmd-L -> Right
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: right_arrow

# }}}

- description: "LCmd + N/M → Delete / Delete Forward"
  manipulators:

  # LCmd-N -> Delete
  - type: basic
    from:
      key_code: "n"
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: delete_or_backspace

  # LCmd-M -> Delete Forward
  - type: basic
    from:
      key_code: m
      modifiers:
        mandatory:
        - left_command
        optional:
        - any
    to:
    - key_code: delete_forward

- description: "LCmd/RCmd → Eisuu/Kana"
  manipulators:

  # LCmd -> Eisuu/LCmd
  - type: basic
    from:
      key_code: left_command
    to:
    - key_code: left_command
      lazy: true
    to_if_alone:
    - key_code: japanese_eisuu

  # RCmd -> Kana/RCmd
  - type: basic
    from:
      key_code: right_command
    to:
    - key_code: right_command
      lazy: true
    to_if_alone:
    - key_code: japanese_kana

# }}}

# Esc/Ctrl {{{

- description: "Caps Lock → Esc/LCtrl"
  manipulators:

  # Caps Lock -> Esc/LCtrl
  - type: basic
    from:
      key_code: caps_lock
      modifiers:
        optional:
        - any
    to:
    - key_code: left_control
      lazy: true
    to_if_alone:
    - key_code: escape

  # Esc -> Esc/LCtrl
  - type: basic
    from:
      key_code: escape
      modifiers:
        optional:
        - any
    to:
    - key_code: left_control
      lazy: true
    to_if_alone:
    - key_code: escape

# }}}

# Num Layer {{{

- description: "Num Layer"
  manipulators:

  # Layer Key {{{

  # Caps Lock -> Layer Key
  - type: basic
    from:
      key_code: caps_lock
      modifiers:
        optional:
        - any
    to:
    - set_variable:
        name: num_layer
        value: 1
    to_after_key_up:
    - set_variable:
        name: num_layer
        value: 0
    to_if_alone:
    - key_code: escape

  # Esc -> Layer Key
  - type: basic
    from:
      key_code: escape
      modifiers:
        optional:
        - any
    to:
    - set_variable:
        name: num_layer
        value: 1
    to_after_key_up:
    - set_variable:
        name: num_layer
        value: 0
    to_if_alone:
    - key_code: escape

  # }}}

  # YUIOP {{{

  # Y -> (no map)
  - type: basic
    from:
      key_code: "y"
      modifiers:
        optional:
        - any
    # to:
    # - key_code:
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # U -> Keypad 7
  - type: basic
    from:
      key_code: u
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_7
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # I -> Keypad 8
  - type: basic
    from:
      key_code: i
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_8
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # O -> Keypad 9
  - type: basic
    from:
      key_code: o
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_9
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # P -> (no map)
  - type: basic
    from:
      key_code: p
      modifiers:
        optional:
        - any
    # to:
    # - key_code:
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # }}}

  # HJKL; {{{

  # H -> Delete
  - type: basic
    from:
      key_code: h
      modifiers:
        optional:
        - any
    to:
    - key_code: delete_or_backspace
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # J -> Keypad 4
  - type: basic
    from:
      key_code: j
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_4
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # K -> Keypad 5
  - type: basic
    from:
      key_code: k
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_5
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # L -> Keypad 6
  - type: basic
    from:
      key_code: l
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_6
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # ; -> Keypad Comma
  - type: basic
    from:
      key_code: semicolon
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_comma
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # }}}

  # NM,./ {{{

  # N -> Keypad 0
  - type: basic
    from:
      key_code: "n"
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_0
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # M -> Keypad 1
  - type: basic
    from:
      key_code: m
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_1
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # , -> Keypad 2
  - type: basic
    from:
      key_code: comma
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_2
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # . -> Keypad 3
  - type: basic
    from:
      key_code: period
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_3
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # / -> Keypad Period
  - type: basic
    from:
      key_code: slash
      modifiers:
        optional:
        - any
    to:
    - key_code: keypad_period
    conditions:
    - type: variable_if
      name: num_layer
      value: 1

  # }}}

# }}}

# Hyper Key {{{

- description: "Tab → Hyper Key"
  manipulators:

  # Tab -> Tab/Hyper
  - type: basic
    from:
      key_code: tab
      modifiers:
        optional: any
    to_if_alone:
    - key_code: tab
    to:
    - key_code: right_shift
      modifiers:
      - right_command
      - right_control
      - right_option
      lazy: true

# }}}

# SandS {{{

- description: "Space → Space/Shift"
  manipulators:

  # Space and Shift
  - type: basic
    from:
      key_code: spacebar
      modifiers:
        optional:
        - any
    to:
    - key_code: left_shift
      lazy: true
    to_if_alone:
    - key_code: spacebar

# }}}
