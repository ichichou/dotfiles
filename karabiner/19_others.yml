title: "19. Others"

# ALIASES {{{

aliases:

- conditions: &en
  - type: input_source_if
    input_sources:
    # 英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.ascii$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.Roman$"
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

- conditions: &ja
  - type: input_source_if
    input_sources:
    - language: "^ja$"
  - type: input_source_unless
    input_sources:
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

# }}}

# RULES ==========================================

rules:

# 19-1. Alone Kana/Eisuu {{{

- description: "19-1. Others: Alone Kana/Eisuu"
  manipulators:

  # Shift-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: japanese_kana
      repeat: false

  # Ctrl-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - control
    to:
    - key_code: japanese_kana
      repeat: false

  # Opt-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - option
    to:
    - key_code: japanese_kana
      repeat: false

  # Cmd-Kana -> Kana
  - type: basic
    from:
      key_code: japanese_kana
      modifiers:
        mandatory:
        - command
    to:
    - key_code: japanese_kana
      repeat: false

  # Shift-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - shift
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Ctrl-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - control
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Opt-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - option
    to:
    - key_code: japanese_eisuu
      repeat: false

  # Cmd-Eisuu -> Eisuu
  - type: basic
    from:
      key_code: japanese_eisuu
      modifiers:
        mandatory:
        - command
    to:
    - key_code: japanese_eisuu
      repeat: false

# }}}

# 19-2. Others: F15-F18 -> , . / : {{{

- description: "19-2. Others: F15–F18 → , . / :"
  manipulators:

  # F15 -> ,
  - type: basic
    from:
      key_code: f15
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: comma
    - key_code: japanese_kana
      conditions: *ja

  # F16 -> .
  - type: basic
    from:
      key_code: f16
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: period
    - key_code: japanese_kana
      conditions: *ja

  # F17 -> /
  - type: basic
    from:
      key_code: f17
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: slash
    - key_code: japanese_kana
      conditions: *ja

  # F18 -> :
  - type: basic
    from:
      key_code: f18
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: semicolon
      modifiers:
      - shift
    - key_code: japanese_kana
      conditions: *ja

# }}}
