title: "05. Symbol Layer"

# ALIASES {{{

aliases:

- from/modifiers: &any
    optional:
    - any

- conditions: &symbol
  - type: variable_if
    name: symbol_layer
    value: true
  - type: device_if
    identifiers:
    # Apple Internal Keyboard
    - is_built_in_keyboard: true

- conditions: &en
  - type: input_source_if
    input_sources:
    # 英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.ascii$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.Roman$"
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

- conditions: &ja
  - type: input_source_if
    input_sources:
    - language: "^ja$"
  - type: input_source_unless
    input_sources:
    # 全角英数
    - input_source_id: "^net\\.mtgto\\.inputmethod\\.macSKK\\.eisu$"
    - input_source_id: "^com\\.google\\.inputmethod\\.Japanese\\.FullWidthRoman$"

# }}}

# RULES

rules:
- description: "5. Symbol Layer"
  manipulators:

# Symbol Layer Key {{{

  # F14 -> Return / Symbol Layer Key
  - type: basic
    from:
      key_code: f14
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: return_or_enter
    to:
    - set_variable:
        name: symbol_layer
        value: true
        key_up_value: false

# }}}

# Upper Row {{{

  # Q -> .
  - type: basic
    from:
      key_code: q
      modifiers: *any
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: period
    - key_code: japanese_kana
      conditions: *ja
    conditions: *symbol

  # W -> +
  - type: basic
    from:
      key_code: w
      modifiers: *any
    to:
    - key_code: equal_sign
      modifiers:
      - shift
    conditions: *symbol

  # E -> _
  - type: basic
    from:
      key_code: e
      modifiers: *any
    to:
    - key_code: hyphen
      modifiers:
      - shift
    conditions: *symbol

  # R -> !
  - type: basic
    from:
      key_code: r
      modifiers: *any
    to:
    - key_code: "1"
      modifiers:
      - shift
    conditions: *symbol

  # T -> |
  - type: basic
    from:
      key_code: t
      modifiers: *any
    to:
    - key_code: backslash
      modifiers:
      - shift
    conditions: *symbol

  # Y -> /
  - type: basic
    from:
      key_code: "y"
      modifiers: *any
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: slash
    - key_code: japanese_kana
      conditions: *ja
    conditions: *symbol

  # U -> &
  - type: basic
    from:
      key_code: u
      modifiers: *any
    to:
    - key_code: "7"
      modifiers:
      - shift
    conditions: *symbol

  # I -> ^
  - type: basic
    from:
      key_code: i
      modifiers: *any
    to:
    - key_code: "6"
      modifiers:
      - shift
    conditions: *symbol

  # O -> $
  - type: basic
    from:
      key_code: o
      modifiers: *any
    to:
    - key_code: "4"
      modifiers:
      - shift
    conditions: *symbol

  # P -> ,
  - type: basic
    from:
      key_code: p
      modifiers: *any
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: comma
    - key_code: japanese_kana
      conditions: *ja
    conditions: *symbol

# }}}

# Middle Row {{{

  # A -> *
  - type: basic
    from:
      key_code: a
      modifiers: *any
    to:
    - key_code: "8"
      modifiers:
      - shift
    conditions: *symbol

  # S -> =
  - type: basic
    from:
      key_code: s
      modifiers: *any
    to:
    - key_code: equal_sign
    conditions: *symbol

  # D -> -
  - type: basic
    from:
      key_code: d
      modifiers: *any
    to:
    - key_code: hyphen
    conditions: *symbol

  # F -> 0
  - type: basic
    from:
      key_code: f
      modifiers: *any
    to:
    - key_code: "0"
    conditions: *symbol

  # G -> @
  - type: basic
    from:
      key_code: g
      modifiers: *any
    to:
    - key_code: "2"
      modifiers:
      - shift
    conditions: *symbol

  # H -> ~
  - type: basic
    from:
      key_code: h
      modifiers: *any
    to:
    - key_code: grave_accent_and_tilde
      modifiers:
      - shift
    conditions: *symbol

  # J -> 1
  - type: basic
    from:
      key_code: j
      modifiers: *any
    to:
    - key_code: "1"
    conditions: *symbol

  # K -> %
  - type: basic
    from:
      key_code: k
      modifiers: *any
    to:
    - key_code: "5"
      modifiers:
      - shift
    conditions: *symbol

  # L -> #
  - type: basic
    from:
      key_code: l
      modifiers: *any
    to:
    - key_code: "3"
      modifiers:
      - shift
    conditions: *symbol

  # Semicolon -> :
  - type: basic
    from:
      key_code: semicolon
      modifiers: *any
    to:
    - key_code: japanese_eisuu
      conditions: *ja
    - key_code: semicolon
      modifiers:
      - shift
    - key_code: japanese_kana
      conditions: *ja
    conditions: *symbol

# }}}

# Lower Row {{{

  # Z -> 8
  - type: basic
    from:
      key_code: z
      modifiers: *any
    to:
    - key_code: "8"
    conditions: *symbol

  # X -> 6
  - type: basic
    from:
      key_code: x
      modifiers: *any
    to:
    - key_code: "6"
    conditions: *symbol

  # C -> 4
  - type: basic
    from:
      key_code: c
      modifiers: *any
    to:
    - key_code: "4"
    conditions: *symbol

  # V -> 2
  - type: basic
    from:
      key_code: v
      modifiers: *any
    to:
    - key_code: "2"
    conditions: *symbol

  # B -> \
  - type: basic
    from:
      key_code: b
      modifiers: *any
    to:
    - key_code: backslash
    conditions: *symbol

  # N -> `
  - type: basic
    from:
      key_code: "n"
      modifiers: *any
    to:
    - key_code: grave_accent_and_tilde
    conditions: *symbol

  # M -> 3
  - type: basic
    from:
      key_code: m
      modifiers: *any
    to:
    - key_code: "3"
    conditions: *symbol

  # Comma -> 5
  - type: basic
    from:
      key_code: comma
      modifiers: *any
    to:
    - key_code: "5"
    conditions: *symbol

  # Period -> 7
  - type: basic
    from:
      key_code: period
      modifiers: *any
    to:
    - key_code: "7"
    conditions: *symbol

  # Slash -> 9
  - type: basic
    from:
      key_code: slash
      modifiers: *any
    to:
    - key_code: "9"
    conditions: *symbol

# }}}

