title: "04. Navigation Layer"

# ALIASES ========================================

aliases:

- from/modifiers: &any
    optional:
    - any

- conditions: &navi
  - type: variable_if
    name: navi_layer
    value: true
  - type: device_if
    identifiers:
    # Apple Internal Keyboard
    - is_built_in_keyboard: true

# RULES ==========================================

rules:
- description: "4. Navigation Layer"
  manipulators:

# Navi Layer Key {{{

  # F13 -> Esc / Navi Layer Key
  - type: basic
    from:
      key_code: f13
      modifiers:
        optional:
        - any
    to_if_alone:
    - key_code: escape
    to:
    - set_variable:
        name: navi_layer
        value: true
        key_up_value: false

# }}}

# Upper Row {{{

  # Q -> Shift-Cmd-C
  - type: basic
    from:
      key_code: q
      modifiers: *any
    to:
    - key_code: c
      modifiers:
      - shift
      - command
    conditions: *navi

  # W -> (
  - type: basic
    from:
      key_code: w
      modifiers: *any
    to:
    - key_code: "9"
      modifiers:
      - shift
    conditions: *navi

  # E -> )
  - type: basic
    from:
      key_code: e
      modifiers: *any
    to:
    - key_code: "0"
      modifiers:
      - shift
    conditions: *navi

  # R -> Shift-Ctrl-Opt-C
  - type: basic
    from:
      key_code: r
      modifiers: *any
    to:
    - key_code: c
      modifiers:
      - shift
      - control
      - option
    conditions: *navi

  # T -> Shift-Cmd-T
  - type: basic
    from:
      key_code: t
      modifiers: *any
    to:
    - key_code: t
      modifiers:
      - shift
      - command
    conditions: *navi

  # Y -> Cmd-Tab
  - type: basic
    from:
      key_code: "y"
      modifiers: *any
    to:
    - key_code: tab
      modifiers:
      - command
    conditions: *navi

  # U -> Ctrl-Tab
  - type: basic
    from:
      key_code: u
      modifiers: *any
    to:
    - key_code: tab
      modifiers:
      - control
    conditions: *navi

  # I -> {
  - type: basic
    from:
      key_code: i
      modifiers: *any
    to:
    - key_code: open_bracket
      modifiers:
      - shift
    conditions: *navi

  # O -> }
  - type: basic
    from:
      key_code: o
      modifiers: *any
    to:
    - key_code: close_bracket
      modifiers:
      - shift
    conditions: *navi

  # P -> Cmd-[
  - type: basic
    from:
      key_code: p
      modifiers: *any
    to:
    - key_code: open_bracket
      modifiers:
      - command
    conditions: *navi

# }}}

# Middle Row {{{

  # A -> Shift-Cmd-A
  - type: basic
    from:
      key_code: a
      modifiers: *any
    to:
    - key_code: a
      modifiers:
      - shift
      - command
    conditions: *navi

  # S -> [
  - type: basic
    from:
      key_code: s
      modifiers: *any
    to:
    - key_code: open_bracket
    conditions: *navi

  # D -> ]
  - type: basic
    from:
      key_code: d
      modifiers: *any
    to:
    - key_code: close_bracket
    conditions: *navi

  # F -> Ctrl-Cmd-V
  - type: basic
    from:
      key_code: f
      modifiers: *any
    to:
    - key_code: v
      modifiers:
      - control
      - command
    conditions: *navi

  # G -> Ctrl-Cmd-S
  - type: basic
    from:
      key_code: g
      modifiers: *any
    to:
    - key_code: s
      modifiers:
      - control
      - command
    conditions: *navi

  # H -> Left Arrow
  - type: basic
    from:
      key_code: h
      modifiers: *any
    to:
    - key_code: left_arrow
    conditions: *navi

  # J -> Down Arrow
  - type: basic
    from:
      key_code: j
      modifiers: *any
    to:
    - key_code: down_arrow
    conditions: *navi

  # K -> Up Arrow
  - type: basic
    from:
      key_code: k
      modifiers: *any
    to:
    - key_code: up_arrow
    conditions: *navi

  # L -> Right Arrow
  - type: basic
    from:
      key_code: l
      modifiers: *any
    to:
    - key_code: right_arrow
    conditions: *navi

  # Semicolon -> Cmd-[
  - type: basic
    from:
      key_code: semicolon
      modifiers: *any
    to:
    - key_code: open_bracket
      modifiers:
      - command
    conditions: *navi

# }}}

# Lower Row {{{

  # Z -> Shift-Cmd-Z
  - type: basic
    from:
      key_code: z
      modifiers: *any
    to:
    - key_code: z
      modifiers:
      - shift
      - command
    conditions: *navi

  # X -> Cmd-X
  - type: basic
    from:
      key_code: x
      modifiers: *any
    to:
    - key_code: x
      modifiers:
      - command
    conditions: *navi

  # C -> Cmd-C
  - type: basic
    from:
      key_code: c
      modifiers: *any
    to:
    - key_code: c
      modifiers:
      - command
    conditions: *navi

  # V -> Shift-Cmd-V
  - type: basic
    from:
      key_code: v
      modifiers: *any
    to:
    - key_code: v
      modifiers:
      - shift
      - command
    conditions: *navi

  # B -> Cmd-V
  - type: basic
    from:
      key_code: b
      modifiers: *any
    to:
    - key_code: v
      modifiers:
      - command
    conditions: *navi

  # N -> Delete
  - type: basic
    from:
      key_code: "n"
      modifiers: *any
    to:
    - key_code: delete_or_backspace
    conditions: *navi

  # M -> Fn-Delete
  - type: basic
    from:
      key_code: m
      modifiers: *any
    to:
    - key_code: delete_or_backspace
      modifiers:
      - fn
    conditions: *navi

  # Comma -> Ctrl-A
  - type: basic
    from:
      key_code: comma
      modifiers: *any
    to:
    - key_code: a
      modifiers:
      - control
    conditions: *navi

  # Period -> Ctrl-E
  - type: basic
    from:
      key_code: period
      modifiers: *any
    to:
    - key_code: e
      modifiers:
      - control
    conditions: *navi

  # Slash -> Cmd-`
  - type: basic
    from:
      key_code: slash
      modifiers: *any
    to:
    - key_code: grave_accent_and_tilde
      modifiers:
      - command
    conditions: *navi

# }}}

