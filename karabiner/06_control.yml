title: "06. Control Key"
rules:
- description: "6. Control Key"
  manipulators:

  # Escape -> Left Control {{{

  # Esc -> Esc/LCtrl
  # Mac 標準のリマップ機能で Caps Lock -> Esc とすることが前提
  - type: basic
    from:
      key_code: escape
      modifiers:
        optional:
        - any
    to:
    - key_code: left_control
      lazy: true
    to_if_alone:
    - key_code: escape

  # }}}

  # Left Control Key Mapping {{{

  # LCtrl-J -> Kana
  # Ctrl-J の入力をアプリに取られて IME に渡らないことが多いため、
  # これを設定しておいたほうが不便がない
  - type: basic
    from:
      key_code: j
      modifiers:
        mandatory:
        - left_control
    to:
    - key_code: japanese_kana
      repeat: false

  # LCtrl-L -> Eisuu
  # Ctrl-J と同様の事情
  - type: basic
    from:
      key_code: l
      modifiers:
        mandatory:
        - left_control
    to:
    - key_code: japanese_eisuu
      repeat: false

  # LCtrl-M -> Return
  - type: basic
    from:
      key_code: m
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: return_or_enter
      repeat: false

  # LCtrl-N -> LCmd-Down
  - type: basic
    from:
      key_code: "n"
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: down_arrow
      modifiers:
      - left_command
      repeat: false

  # LCtrl-P -> LCmd-Up
  - type: basic
    from:
      key_code: p
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: up_arrow
      modifiers:
      - left_command
      repeat: false

  # LCtrl-H -> Delete
  - type: basic
    from:
      key_code: h
      modifiers:
        mandatory:
        - left_control
        optional:
        - any
    to:
    - key_code: delete_or_backspace
      repeat: true

  # LCtrl-U -> LCmd-Delete
  - type: basic
    from:
      key_code: u
      modifiers:
        mandatory:
        - left_control
    to:
    - key_code: delete_or_backspace
      modifiers:
      - left_command
      repeat: true

  # }}}
